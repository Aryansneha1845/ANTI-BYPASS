<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check</title>
    
    <script type="text/javascript" src="https://pl29621155.effectivecpmnetwork.com/2c/d0/1a/2cd01a877d000affa62e4d493bdc04ae.js"></script>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h2 { color: #38bdf8; margin-bottom: 1rem; }
        p { color: #94a3b8; font-size: 0.95rem; line-height: 1.5; margin-bottom: 2rem; }
        .captcha-box {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #7dd3fc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Security Check</h2>
    <p>Bypass bots ko rokne ke liye niche diye gaye captcha ko verify karein.</p>
    
    <form action="/redirect/{{ link_id }}" method="POST">
        <div class="captcha-box">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAADdlsLO4J02xbgEV"></div>
        </div>
        <button type="submit" class="btn">Verify & Continue</button>
    </form>
</div>

</body>
</html>
