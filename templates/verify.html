<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Check</title>

  <!-- 👇 YAHAN APNI AD SCRIPT PASTE KARNA 👇 -->
  <script>
    // Tera Ad Code Yahan Aayega
  </script>
  <!-- 👆 Ad Script End 👆 -->

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem;
    }

    .container {
      background-color: #1e293b;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
      max-width: 440px;
      width: 100%;
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      background: rgba(56,189,248,0.1);
      border: 1px solid rgba(56,189,248,0.25);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 0.72rem;
      color: #38bdf8;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h2 {
      font-family: 'Syne', sans-serif;
      color: #38bdf8;
      font-size: 1.7rem;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.88rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    /* AD BOX */
    .ad-box {
      background: #0f172a;
      border: 1px solid #2d3f55;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .ad-label {
      font-size: 0.65rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      border-bottom: 1px solid #2d3f55;
    }
    .ad-content {
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      color: #475569;
      font-size: 0.82rem;
      text-align: center;
    }

    /* COUNTDOWN RING */
    .countdown-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .ring-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: 0.6rem;
    }

    svg.ring {
      width: 80px;
      height: 80px;
      transform: rotate(-90deg);
    }

    .ring-bg { fill: none; stroke: #2d3f55; stroke-width: 6; }
    .ring-progress {
      fill: none;
      stroke: #38bdf8;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 201;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .ring-number {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #f8fafc;
    }

    .countdown-label {
      font-size: 0.78rem;
      color: #94a3b8;
    }

    /* CAPTCHA */
    .captcha-box {
      display: flex;
      justify-content: center;
      margin-bottom: 1.2rem;
    }

    /* BUTTONS */
    .btn {
      background-color: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-bottom: 10px;
    }
    .btn:hover:not(:disabled) {
      background-color: #7dd3fc;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(56,189,248,0.35);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      color: #64748b;
      border: 1px solid #2d3f55;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
    }
    .btn-secondary:hover {
      color: #94a3b8;
      border-color: #3d5470;
      background: rgba(255,255,255,0.02);
      transform: none;
      box-shadow: none;
    }

    .success-msg {
      display: none;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.82rem;
      color: #22c55e;
      margin-bottom: 1rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    .divider { height: 1px; background: #2d3f55; margin: 1.2rem 0; }

    .footer-note {
      font-size: 0.7rem;
      color: #475569;
    }

    .pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 4px 16px rgba(56,189,248,0.3); }
      50%      { box-shadow: 0 4px 32px rgba(56,189,248,0.6); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="badge">🔒 Secure Link</div>
  <h2>Security Check</h2>
  <p class="subtitle">Watch a short ad, then complete the captcha to access your link.</p>

  <!-- AD BOX -->
  <div class="ad-box">
    <div class="ad-label">📢 Advertisement</div>
    <div class="ad-content">
      <!-- 👇 YAHAN APNA AD CODE PASTE KARO (banner/video) 👇 -->
      <span>[ Ad loads here ]</span>
      <!-- 👆 Ad Code End 👆 -->
    </div>
  </div>

  <!-- COUNTDOWN RING -->
  <div class="countdown-wrap">
    <div class="ring-container">
      <svg class="ring" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="32"/>
        <circle class="ring-progress" id="ringProgress" cx="40" cy="40" r="32"/>
      </svg>
      <div class="ring-number" id="countdownNum">5</div>
    </div>
    <div class="countdown-label" id="countdownLabel">Please wait...</div>
  </div>

  <!-- SUCCESS MSG -->
  <div class="success-msg" id="successMsg">✅ Done! Complete the captcha and click continue.</div>

  <!-- ORIGINAL CLOUDFLARE FORM — untouched -->
  <form action="/redirect/{{ link_id }}" method="POST" id="verifyForm">
    <div class="captcha-box">
      <div class="cf-turnstile" data-sitekey="0x4AAAAAADdlsLO4J02xbgEV"></div>
    </div>
    <button type="submit" class="btn" id="submitBtn" disabled>
      ⏳ <span id="btnText">Please wait (5s)</span>
    </button>
  </form>

  <button class="btn btn-secondary" onclick="reportBroken()">❌ Link not working?</button>

  <div class="divider"></div>
  <p class="footer-note">🛡️ Protected by Cloudflare · Free ad-supported service</p>
</div>

<script>
  const TOTAL = 5;
  const circumference = 2 * Math.PI * 32; // ~201
  let secondsLeft = TOTAL;
  let countdownDone = false;

  const ring = document.getElementById('ringProgress');
  const numEl = document.getElementById('countdownNum');
  const labelEl = document.getElementById('countdownLabel');
  const btn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const successMsg = document.getElementById('successMsg');

  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = 0;

  const interval = setInterval(() => {
    secondsLeft--;
    const progress = secondsLeft / TOTAL;
    ring.style.strokeDashoffset = circumference * progress;
    numEl.textContent = secondsLeft;
    btnText.textContent = `Please wait (${secondsLeft}s)`;

    if (secondsLeft <= 0) {
      clearInterval(interval);
      numEl.textContent = '✓';
      numEl.style.fontSize = '1.1rem';
      labelEl.textContent = 'Complete captcha below ↓';
      countdownDone = true;
      btn.disabled = false;
      btn.classList.add('pulse');
      btnText.textContent = 'Verify & Continue →';
      btn.querySelector('span') && (btn.childNodes[0].textContent = '🔓 ');
      successMsg.style.display = 'block';
    }
  }, 1000);

  function reportBroken() {
    if (confirm('Report this link as broken?')) {
      alert('Thanks for reporting! We\'ll look into it. 🙏');
    }
  }
</script>

</body>
</html>
